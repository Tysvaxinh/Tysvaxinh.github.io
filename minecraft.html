<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Click để xem điều bất ngờ</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #a8edea 0%, #fed6e3 50%, #ffd3a5 100%);
    background-size: 400% 400%;
    animation: gradientShift 8s ease infinite;
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    text-align: center;
    overflow: hidden;
  }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .title {
    font-size: 36px;
    color: #ff6b9d;
    text-shadow: 2px 2px 0 #fff, 4px 4px 0 #ffc1e3;
    margin-bottom: 10px;
    animation: bounce 1.5s ease-in-out infinite;
  }
  .subtitle {
    font-size: 18px;
    color: #6b5b95;
    margin-bottom: 30px;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .emoji-row {
    font-size: 40px;
    margin-bottom: 30px;
  }
  .emoji-row span {
    display: inline-block;
    animation: float 2s ease-in-out infinite;
    margin: 0 8px;
  }
  .emoji-row span:nth-child(2) { animation-delay: 0.3s; }
  .emoji-row span:nth-child(3) { animation-delay: 0.6s; }
  .emoji-row span:nth-child(4) { animation-delay: 0.9s; }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(10deg); }
  }
  #start-btn {
    padding: 20px 50px;
    font-size: 28px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, #ff9a9e, #fecfef);
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 8px 0 #e0729a, 0 12px 20px rgba(0,0,0,0.15);
    transition: transform 0.1s;
  }
  #start-btn:active {
    transform: translateY(8px);
    box-shadow: 0 0 0 #e0729a;
  }
  #jumpscare {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #fff;
    z-index: 999;
    justify-content: center;
    align-items: center;
    animation: bgflash 0.15s infinite;
  }
  #jumpscare img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0; left: 0;
    animation: flash 0.15s infinite;
  }
  #jumpscare h1 {
    position: absolute;
    color: red;
    font-size: 80px;
    font-weight: bold;
    text-shadow: 4px 4px 0 #fff;
    animation: flash 0.15s infinite;
  }
  @keyframes flash {
    0%, 50% { filter: brightness(1) contrast(1) hue-rotate(0deg); transform: scale(1) rotate(0deg) translate(0,0); }
    10% { filter: brightness(3) contrast(2) hue-rotate(90deg); transform: scale(1.2) rotate(-8deg) translate(10px,-5px); }
    25% { filter: brightness(2.5) contrast(1.5) invert(1); transform: scale(1.3) rotate(6deg) translate(-15px,8px); }
    40% { filter: brightness(0.3) contrast(3); transform: scale(1.1) rotate(-4deg) translate(8px,10px); }
    60% { filter: brightness(3) hue-rotate(180deg); transform: scale(1.25) rotate(8deg) translate(-10px,-8px); }
    75% { filter: brightness(2.5) contrast(2) invert(1); transform: scale(1.15) rotate(-6deg) translate(12px,5px); }
    90% { filter: brightness(0.4); transform: scale(1.2) rotate(4deg) translate(-8px,-10px); }
  }
  @keyframes bgflash {
    0%, 50% { background: #000; }
    10%, 60% { background: #ff0000; }
    25%, 75% { background: #fff; }
    40%, 90% { background: #000; }
  }
</style>
</head>
<body>
  <div class="title">🎮 Minecraft lậu :] 🎮</div>
  <div class="subtitle">by tysvaxinh(tôi)</div>
  <div class="emoji-row">
    <span>🎈</span><span>🎮</span><span>✨</span><span>🌈</span>
  </div>
  <button id="start-btn" onclick="startScare()">Chơi</button>

  <div id="jumpscare">
    <h1>👁️ NHÌN ĐÂY 👁️</h1>
    <img src="https://static.wikia.nocookie.net/creepypasta-files/images/5/56/JeffTheKiller%282%29.jpg/revision/latest/thumbnail/width/360/height/450?cb=20241128075405" alt="cute jumpscare">
  </div>

  <script>
    var audioCtx;
    var activeOscillators = [];
    function playScreamSound() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return {
        play: function() {
          beep();
          this.interval = setInterval(beep, 1000);
        }
      };
    }
    function beep() {
      var now = audioCtx.currentTime;
      var gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.5, now);
      gain.gain.linearRampToValueAtTime(0.5, now + 0.85);
      gain.gain.linearRampToValueAtTime(0, now + 1);
      gain.connect(audioCtx.destination);

      // Multiple shrieking oscillators, dissonant + unstable pitch
      var freqs = [1800, 2400, 3000, 3600];
      freqs.forEach(function(f, i) {
        var osc = audioCtx.createOscillator();
        osc.type = i % 2 === 0 ? 'sawtooth' : 'square';
        osc.frequency.setValueAtTime(f * 0.6, now);
        osc.frequency.exponentialRampToValueAtTime(f * 1.3, now + 0.2);
        osc.frequency.exponentialRampToValueAtTime(f * 0.5, now + 0.45);
        osc.frequency.exponentialRampToValueAtTime(f * 1.4, now + 0.7);
        osc.frequency.exponentialRampToValueAtTime(f * 0.7, now + 1);

        var oscGain = audioCtx.createGain();
        oscGain.gain.value = 0.25;
        osc.connect(oscGain);
        oscGain.connect(gain);
        osc.start(now);
        osc.stop(now + 1);
      });

      // White noise burst for harsh "scream" texture
      var bufferSize = audioCtx.sampleRate * 1;
      var buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      var data = buffer.getChannelData(0);
      for (var i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1);
      }
      var noise = audioCtx.createBufferSource();
      noise.buffer = buffer;

      var noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.setValueAtTime(2500, now);
      noiseFilter.Q.value = 5;

      var noiseGain = audioCtx.createGain();
      noiseGain.gain.value = 0.35;

      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(gain);
      noise.start(now);
      noise.stop(now + 1);
    }
  </script>
  <audio id="sound" src="https://tmpfiles.org/dl/wMwNn312vvWP/final_60108db6919bc200b087a3a2_239343.mp3.mp3" preload="auto" loop></audio>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script>
    function startScare() {
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('jumpscare').style.display = 'flex';
      var s = document.getElementById('sound');
      s.volume = 1.0;
      s.currentTime = 0;
      s.play().catch(()=>{});
      confetti({ particleCount: 150, spread: 100, origin: { y: 0.5 } });
      setInterval(() => {
        confetti({ particleCount: 50, spread: 80, origin: { y: 0.5 } });
      }, 1000);
    }
  </script>
</body>
</html>
